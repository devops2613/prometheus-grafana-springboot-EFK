server:
  port: 8082

spring:
  application:
    name: prometheus-grafana-springboot

  datasource:
    url: jdbc:postgresql://localhost:5432/ordersdb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: prometheus-grafana-springboot

# ============================================
# Logging Configuration for ELK
# ============================================
logging:
  level:
    root: INFO
    com.example: DEBUG
  pattern:
    console: "{\"timestamp\":\"%d{ISO8601}\",\"level\":\"%p\",\"thread\":\"%thread\",\"logger\":\"%logger{36}\",\"message\":\"%m\",\"exception\":\"%wEx\"}%n"
  file:
    name: logs/spring-boot-app.log
    path: ./logs
